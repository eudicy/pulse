services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: pmapp
      POSTGRES_PASSWORD: pmapp
      POSTGRES_DB: pmapp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data:
